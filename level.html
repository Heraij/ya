<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Details</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .level-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; font-weight: bold; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; margin-top: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-box { background: #1e1e24; padding: 15px; border-radius: 6px; text-align: center; border-bottom: 3px solid #3b82f6; }
        .stat-box span { display: block; font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; }
        .stat-box strong { font-size: 1.4rem; color: #fff; }
    </style>
</head>
<body>

    <main class="level-container">
        <a href="list.html" class="back-link">Back to Demon List</a>
        
        <h1 id="level-name">Loading Level...</h1>
        <p id="level-author" style="color: #94a3b8; font-size: 1.1rem; margin-top: -10px;"></p>

        <div class="stats-grid">
            <div class="stat-box">
                <span>Difficulty</span>
                <strong id="stat-difficulty">-</strong>
            </div>
            <div class="stat-box">
                <span>Attempts</span>
                <strong id="stat-attempts">-</strong>
            </div>
        </div>

        <div id="level-description-box" style="margin: 30px 0; line-height: 1.6;">
            <p id="level-description">No description provided yet.</p>
        </div>

        <div id="video-wrapper" style="display: none;">
            <h3>Gameplay Showcase:</h3>
            <div class="video-container">
                <iframe id="video-frame" src="" allowfullscreen></iframe>
            </div>
        </div>
    </main>

    <script>
    async function loadLevelData() {
        // 1. Grab the ?rank=X value from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const rankParam = urlParams.get('rank');

        if (!rankParam) {
            document.getElementById('level-name').innerText = "No rank specified.";
            return;
        }

        // Convert the string rank (e.g., "1") into an array index integer (e.g., 0)
        const targetIndex = parseInt(rankParam, 10) - 1;

        try {
            // 2. Fetch your clean data.json file
            const response = await fetch('data.json');
            const data = await response.json();
            const list = data.hardest_completions;

            // 3. Make sure the rank actually exists in your array
            if (targetIndex < 0 || targetIndex >= list.length) {
                document.getElementById('level-name').innerText = `Rank #${rankParam} Not Found`;
                return;
            }

            // Pull the level details using the array index position
            const level = list[targetIndex];

            // 4. Inject data into the template elements
            document.title = `#${rankParam} - ${level.name} | Details`;
            document.getElementById('level-name').innerText = `#${rankParam}. ${level.name}`;
            document.getElementById('level-author').innerText = `by ${level.author}`;
            document.getElementById('stat-difficulty').innerText = level.difficulty;
            document.getElementById('stat-attempts').innerText = level.attempts;
            
            if (level.description) {
                document.getElementById('level-description').innerText = level.description;
            } else {
                document.getElementById('level-description').innerText = "No description provided yet.";
            }

            // 5. Setup the video embed if available
            if (level.video_id) {
                document.getElementById('video-frame').src = `https://www.youtube.com/embed/${level.video_id}`;
                document.getElementById('video-wrapper').style.display = 'block';
            } else {
                document.getElementById('video-wrapper').style.display = 'none';
            }

        } catch (error) {
            console.error("Error loading level details:", error);
            document.getElementById('level-name').innerText = "Error loading details.";
        }
    }

    window.onload = loadLevelData;
</script>
</body>
</html>
