<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Demon List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <a href="index.html" class="back-link" style="display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; font-weight: bold;">← Back to Portfolio</a>
        
        <h1 class="page-title">Hardest Completions</h1>
        <p class="page-subtitle">My personal Geometry Dash progression milestone tracker.</p>

        <div id="list-container">
            <p style="color: #94a3b8;">Loading list data...</p>
        </div>
    </main>

    <script>
        // Fallback list just in case data.json can't be fetched locally
        const fallbackList = [
            { "name": "Nine Circles", "author": "Zobros", "difficulty": "Hard Demon", "tier": "hard", "attempts": "778", "video_id": "aTObXPHFEPw" },
            { "name": "Paracosm Circles", "author": "N1XO", "difficulty": "Medium Demon", "tier": "medium", "attempts": "429", "video_id": "9u_fkpAqdOY" }
        ];

        function renderList(completions) {
            const container = document.getElementById('list-container');
            container.innerHTML = ''; // Clear out loading text

            if (!completions || completions.length === 0) {
                container.innerHTML = '<p style="color: #ef4444;">No completions found.</p>';
                return;
            }

            completions.forEach((item, index) => {
                const dynamicRank = index + 1;

                // Determine if this specific card deserves a theme override class
                let themeClass = `border-${item.tier}`; // Standard fallback (e.g., border-hard)
                
                if (item.name && item.name.toLowerCase() === "nine circles") {
                    themeClass = "theme-hell";
                } else if (item.name && item.name.toLowerCase() === "paracosm circles") {
                    themeClass = "theme-vortex";
                }

                // Setup the Watch Video button conditionally if video_id exists
                let videoButton = '';
                if (item.video_id) {
                    videoButton = `<a href="https://youtu.be/${item.video_id}" target="_blank" class="watch-btn">Watch Video</a>`;
                }

                // Inject the card layout safely
                container.innerHTML += `
                    <div class="card list-item ${themeClass}">
                        <div class="list-rank">#${dynamicRank}</div>
                        <div class="list-info">
                            <h3><a href="level.html?rank=${dynamicRank}" style="color: inherit; text-decoration: none;">${item.name}</a></h3>
                            <div class="list-meta">
                                by ${item.author} — <strong>${item.difficulty}</strong> (${item.attempts} Attempts)
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                            <a href="level.html?rank=${dynamicRank}" class="watch-btn" style="background: #3b82f6;">View Details</a>
                            ${videoButton}
                        </div>
                    </div>
                `;
            });
        }

        async function loadListData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error("File fetch failed");
                const data = await response.json();
                
                // Read the hardest_completions array from your JSON structure
                renderList(data.hardest_completions);
            } catch (error) {
                console.warn("Could not load data.json, using fallback list. Details:", error);
                renderList(fallbackList);
            }
        }

        window.onload = loadListData;
    </script>
</body>
</html>
