<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardest Completions | Creator+</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom Styles specifically for the Demon List */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            margin-bottom: 15px;
            background: #1e1e24;
            border-left: 5px solid #ff00ff; /* Dynamic fallback border */
        }
        .list-rank {
            font-size: 1.8rem;
            font-weight: bold;
            color: #94a3b8;
            margin-right: 20px;
            min-width: 40px;
        }
        .list-info {
            flex-grow: 1;
        }
        .list-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
        }
        .list-meta {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .watch-btn {
            background: #ff0000;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
        }
        /* Demon Tier Border Accents */
        .border-easy { border-left-color: #00ff44 !important; }
        .border-medium { border-left-color: #00bbff !important; }
        .border-hard { border-left-color: #ff00ff !important; }
        .border-insane { border-left-color: #ff3300 !important; }
        .border-extreme { border-left-color: #880000 !important; }
        
        .back-nav {
            margin-bottom: 20px;
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <main class="container" style="margin-top: 40px;">
        
        <section class="section">
            <h2>CreatorPlus List</h2>
            <div id="demon-list-container">
                <!-- JavaScript will inject your completions list here dynamically -->
            </div>
        </section>
    </main>

    <script>
        // Updated backup fallback data without hardcoded ranks
        const fallbackList = [
            { "name": "Loading...", "author": "MotleyOrc", "difficulty": "Medium Demon", "tier": "medium", "attempts": "1,200", "video_id": "" },
            { "name": "Loading...", "author": "Jax", "difficulty": "Easy Demon", "tier": "easy", "attempts": "340", "video_id": "" }
        ];

        function renderList(completions) {
            const container = document.getElementById('demon-list-container');
            container.innerHTML = '';

            // Using (item, index) lets us track exactly where the level sits top-to-bottom
            completions.forEach((item, index) => {
                // Since array index starts at 0, adding 1 turns it into #1, #2, #3, etc.
                const dynamicRank = index + 1;

                let videoButton = '';
                if (item.video_id) {
                    videoButton = `<a href="https://youtu.be/${item.video_id}" target="_blank" class="watch-btn">Watch Video</a>`;
                }

                container.innerHTML += `
                    <div class="card list-item border-${item.tier}">
                        <div class="list-rank">#${dynamicRank}</div>
                        <div class="list-info">
                            <h3>${item.name}</h3>
                            <div class="list-meta">
                                by ${item.author} — <strong>${item.difficulty}</strong> (${item.attempts} Attempts)
                            </div>
                        </div>
                        ${videoButton}
                    </div>
                `;
            });
        }

        async function initList() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderList(data.hardest_completions || fallbackList);
            } catch (err) {
                renderList(fallbackList);
            }
        }
        // Replace the inside of your completions.forEach loop in list.html:
const dynamicRank = index + 1;

let videoButton = '';
if (item.video_id) {
    videoButton = `<a href="https://youtu.be/${item.video_id}" target="_blank" class="watch-btn">Watch Video</a>`;
}

container.innerHTML += `
    <div class="card list-item border-${item.tier}">
        <div class="list-rank">#${dynamicRank}</div>
        <div class="list-info">
            <!-- Link using the dynamic rank number -->
            <h3><a href="level.html?rank=${dynamicRank}" style="color: inherit; text-decoration: none;">${item.name}</a></h3>
            <div class="list-meta">
                by ${item.author} — <strong>${item.difficulty}</strong>
            </div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="level.html?rank=${dynamicRank}" class="watch-btn" style="background: #3b82f6;">View Details</a>
            ${videoButton}
        </div>
    </div>
`;

        window.onload = initList;
    </script>
</body>
</html>
