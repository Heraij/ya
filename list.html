<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Demon List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <a href="index.html" class="back-link" style="display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; font-weight: bold;">← Back to Portfolio</a>
        
        <h1 class="page-title">Hardest Completions</h1>
        <p class="page-subtitle">My personal Geometry Dash progression milestone tracker.</p>

        <div id="list-container">
            <p style="color: #94a3b8;">Loading list data...</p>
        </div>
    </main>

    <script>
        const fallbackList = [
            { "name": "Nine Circles", "author": "Zobros", "difficulty": "Hard Demon", "tier": "hard", "attempts": "778", "video_id": "aTObXPHFEPw" },
            { "name": "Paracosm Circles", "author": "N1XO", "difficulty": "Medium Demon", "tier": "medium", "attempts": "429", "video_id": "9u_fkpAqdOY" }
        ];

        function renderList(completions) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';

            if (!completions || completions.length === 0) {
                container.innerHTML = '<p style="color: #ef4444;">No completions found.</p>';
                return;
            }

            completions.forEach((item, index) => {
                const dynamicRank = index + 1;
                let themeClass = `border-${item.tier}`; 

                let videoButton = '';
                if (item.video_id) {
                    videoButton = `<a href="https://youtu.be/${item.video_id}" target="_blank" class="watch-btn">Watch Video</a>`;
                }

                container.innerHTML += `
                    <div class="card list-item ${themeClass}" style="display: flex; justify-content: space-between; align-items: center; gap: 20px; padding: 20px; margin-bottom: 15px;">
                        <div style="display: flex; align-items: center; gap: 20px;">
                            <div class="list-rank" style="font-size: 1.5rem; font-weight: bold; min-width: 40px;">#${dynamicRank}</div>
                            <div class="list-info">
                                <h3 style="margin: 0 0 5px 0;"><a href="level.html?rank=${dynamicRank}" style="color: inherit; text-decoration: none;">${item.name}</a></h3>
                                <div class="list-meta" style="color: #94a3b8; font-size: 0.9rem;">
                                    by ${item.author} — <strong>${item.difficulty}</strong> (${item.attempts} Attempts)
                                </div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; shrink: 0;">
                            <a href="level.html?rank=${dynamicRank}" class="watch-btn" style="background: #3b82f6;">View Details</a>
                            ${videoButton}
                        </div>
                    </div>
                `;
            });
        }

        async function loadListData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderList(data.hardest_completions);
            } catch (error) {
                renderList(fallbackList);
            }
        }

        window.onload = loadListData;
    </script>
</body>
</html>
